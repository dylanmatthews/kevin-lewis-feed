name: Build Findings RSS feed

on:
  schedule:
    # 13:00 UTC daily (~8–9am US Eastern). GitHub may delay scheduled runs
    # by a few minutes to ~an hour under load; exact timing isn't critical.
    - cron: "0 13 * * *"
  workflow_dispatch: {}   # lets you run it on demand from the Actions tab

# Needed so the job can commit the regenerated feed back to the repo.
permissions:
  contents: write

concurrency:
  group: build-feed
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate feed
        run: python build_feed.py

      - name: Commit feed if it changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add feed.xml index.html
          if git diff --staged --quiet; then
            echo "No changes to publish."
          else
            git commit -m "Update Findings feed [skip ci]"
            git push
          fi
